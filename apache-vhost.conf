<VirtualHost *:80>
    ServerName iol-alerts.local
    DocumentRoot /path/to/iol-alerts/web

    <Directory /path/to/iol-alerts/web>
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Pass DB credentials to PHP
    SetEnv DB_HOST "127.0.0.1"
    SetEnv DB_PORT "3306"
    SetEnv DB_USER "root"
    SetEnv DB_PASSWORD ""
    SetEnv DB_NAME "iol_alerts"

    ErrorLog ${APACHE_LOG_DIR}/iol-alerts-error.log
    CustomLog ${APACHE_LOG_DIR}/iol-alerts-access.log combined
</VirtualHost>
